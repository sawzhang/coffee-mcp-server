# Coffee Company — default demo brand
brand_id: coffee_company
brand_name: "Coffee Company"
server_name: "Coffee Company ToC"
default_user_id: "CC_M_100001"

instructions: |
  Coffee Company 消费者自助 MCP Server。
  提供活动发现、优惠券领取、菜单浏览、门店查找、积分商城、下单点餐等能力。
  所有工具基于登录用户身份自动识别，无需传入会员ID。
  Demo 模式默认用户：张三（金星级，142颗星星）。

  安全说明：工具按风险分为 L0(公开只读) ~ L3(高危写入) 四级，
  高危操作有频率限制和参数校验，详见 docs/TOC_SECURITY.md。

  重要：下单前必须先调用 calculate_price 获取 confirmation_token，
  然后将 confirmation_token 传入 create_order。
  L3 操作（create_order, stars_redeem）需要 idempotency_key 防重复。

# Adapter: omitted = use DemoAdapter with built-in mock data

# OAuth 2.1 (Stage 1) — used only by `coffee-company-toc-oauth` entry point.
# Stdio entries (coffee-company-toc / coffee-company-toc-http) ignore this block.
oauth:
  use_mock_as: true
  issuer: "http://localhost:8765/mock-as"
  authorization_endpoint: "http://localhost:8765/mock-as/authorize"
  token_endpoint: "http://localhost:8765/mock-as/token"
  jwks_uri: null
  audience: "mcp://coffee_company/toc"
  redirect_uri: "http://localhost:8765/oauth/callback"
  scopes_supported:
    - "read:account"
    - "read:orders"
    - "read:rewards"
    - "write:addresses"
    - "write:orders"
    - "redeem:stars"
  h5_login_url: "http://localhost:8765/h5/login"

validation:
  phone_pattern: "^1\\d{10}$"
  valid_sizes: ["tall", "grande", "venti"]
  valid_milks: ["whole", "skim", "oat", "almond", "soy", "coconut"]
  valid_temps: ["hot", "iced", "blended"]
  valid_extras: ["extra_shot", "vanilla_syrup", "caramel_syrup",
                  "hazelnut_syrup", "whipped_cream", "cocoa_powder"]
  valid_pickup: ["自提", "外送", "堂食"]
  max_quantity: 99
  max_items_per_order: 20
  max_addresses: 10

rate_limits:
  L0: { max_calls: 60, window_seconds: 60 }
  L1: { max_calls: 30, window_seconds: 60 }
  L2: { max_calls: 5,  window_seconds: 3600 }
  L3: { max_calls: 10, window_seconds: 86400 }

size_options:
  tall:   { name: "中杯",   extra_price: 0 }
  grande: { name: "大杯",   extra_price: 4 }
  venti:  { name: "超大杯", extra_price: 7 }

milk_options:
  whole:   { name: "全脂牛奶", extra_price: 0 }
  skim:    { name: "脱脂牛奶", extra_price: 0 }
  oat:     { name: "燕麦奶",   extra_price: 5 }
  almond:  { name: "杏仁奶",   extra_price: 5 }
  soy:     { name: "豆奶",     extra_price: 4 }
  coconut: { name: "椰奶",     extra_price: 5 }

temp_options:
  hot:     { name: "热" }
  iced:    { name: "冰" }
  blended: { name: "冰沙" }

sweetness_options:
  normal: { name: "标准糖" }
  less:   { name: "少糖" }
  half:   { name: "半糖" }
  none:   { name: "无糖" }

extra_options:
  extra_shot:     { name: "浓缩+1份",  price: 6 }
  vanilla_syrup:  { name: "香草糖浆",  price: 4 }
  caramel_syrup:  { name: "焦糖糖浆",  price: 4 }
  hazelnut_syrup: { name: "榛果糖浆",  price: 4 }
  whipped_cream:  { name: "奶油顶",    price: 3 }
  cocoa_powder:   { name: "可可粉",    price: 0 }

features:
  campaigns: true
  coupons: true
  stars_mall: true
  delivery: true
  nutrition: true
